<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UCP.REC — Formulário Setor Mapper | Horizonte Roleplay</title>
<meta name="description" content="Formulário oficial para inscrição no setor Mapper do Horizonte Roleplay." />
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
<div id="panel-root"></div>
<script src="assets/app.js"></script>
<script>
renderPanel({active:"inicio"});
document.getElementById("main-content").innerHTML = `
  <div class="card prose">
    <h1>Formulário para Inscrição do Setor Mapper</h1>
    <p class="subtitle">Horizonte Roleplay® — Para todos os servidores</p>

    <h2 style="margin-top:1.5rem">Aviso</h2>
    <p>A função "MAPPER" da administração do Horizonte Roleplay® é exercida somente por PC e tem como responsabilidade e dever manter o controle dos tickets inseridos na categoria "mapeamento" no Discord e manter a ordem dos pedidos; analisar os pedidos e a casa solicitada e verificar a possibilidade de mapeio na mesma; mapear as casas solicitadas de acordo com a vontade do cliente dentro da possibilidade.</p>
    <p>O setor Mapper é um trabalho voluntário e exige responsabilidade, conhecimento sobre mapeamento, educação e respeito. O formulário do setor Mapper não é recrutamento para o suporte da staff, você não irá ser uma ADM dentro da cidade, você terá apenas a permissão para executar os comandos do setor Mapper durante o mapeamento.</p>
    <p>Você está sujeito a ser abordado, ser morto ou ser preso pela polícia. O Mapper dentro da cidade é considerado como arquiteto responsável por realizar o mapeamento dos atendimentos via ticket no Discord oficial do servidor. O setor Mapper não é obrigatório e não exige uma quantidade fixa de mapeamentos por dia, porém é necessário comprometimento para se manter no setor.</p>
    <p>É necessário ser de computador ou notebook e ter uma conta dentro do servidor Horizonte Roleplay para realizar o mapeamento das casas dos jogadores que possuem família VIP.</p>
    <p>Antes de prosseguir com a área do formulário, fique atento: todas as perguntas devem estar de acordo com as suas informações dentro da cidade. Caso alguma resposta esteja errada, o formulário será reprovado.</p>
    <p><strong>Ao prosseguir com a inscrição, você está de acordo com a concordância do setor Mapper.</strong></p>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="location.href='formulario.html'">Concordo</button>
    </div>
  </div>
`;
</script>
</body>
</html>
