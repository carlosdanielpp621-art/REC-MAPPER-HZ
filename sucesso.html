<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Formulário enviado — REC Mapper</title>
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
<div id="panel-root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="assets/app.js"></script>
<script>
(async ()=>{
  await refreshAuth();
  renderPanel({active:"inicio"});
  document.getElementById("main-content").innerHTML = `
    <div class="card prose" style="max-width:720px;margin:2rem auto">
      <h1>✅ Formulário enviado com sucesso</h1>
      <p>Seu formulário foi enviado com sucesso, agora aguarde enquanto a equipe administrativa analisa as suas informações dentro do prazo de até <strong>10 dias</strong>.</p>
      <p>Caso não haja resposta nesse período, abra um ticket no Discord informando o e-mail utilizado no formulário.</p>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="location.href='/inicio.html'">Voltar ao início</button>
      </div>
    </div>`;
})();
</script>
</body>
</html>
